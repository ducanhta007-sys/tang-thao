<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thảo </title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%); 
            font-family: 'Quicksand', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(216, 27, 96, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            border: 2px solid #fff;
        }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            color: #d81b60; 
            font-size: 3em; 
            margin-bottom: 20px; 
        }
        
        p { color: #636e72; line-height: 1.8; margin-bottom: 30px; font-size: 1.15em; }

        .btn {
            background: linear-gradient(45deg, #ff4081, #d81b60);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(216, 27, 96, 0.3);
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #gift-content { display: none; animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Heart icon has been removed from this version */

        .petal {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="welcome-screen">
            <h1>Gửi Thảo...</h1>
            <p>Nhân dịp mùng 8 tháng 3,<br>mình có một điều bất ngờ nho nhỏ dành tặng riêng cho đệ.<br>Sẵn sàng chưa nào?</p>
            <button class="btn" onclick="moQua()">Mở Quà Nhé ✨</button>
        </div>

        <div id="gift-content">
            <h1>Quà của Thảo nèee</h1>
            <p>Mình chúc đệ 8/3 thật vui vẻ và luôn hạnh phúc nhé. <br><br> Mong rằng đệ sẽ luôn tự tin, yêu đời và tỏa sáng theo cách riêng của đệ nhaaaa!</p>
        </div>
    </div>

    <script>
        function moQua() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('gift-content').style.display = 'block';
            taoHieuUng();
        }

        function taoHieuUng() {
            const symbols = ['🌸', '💖', '✨', '🎈', '🌼']; 
            setInterval(() => {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 2 + 3 + 's';
                petal.style.fontSize = Math.random() * 20 + 20 + 'px';
                petal.style.opacity = Math.random();
                document.body.appendChild(petal);

                setTimeout(() => { petal.remove(); }, 5000);
            }, 200);
        }
    </script>
</body>
</html>
